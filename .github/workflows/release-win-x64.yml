name: Release Windows x64

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-win-x64.yml"
      - "src/**"
      - "tests/**"
      - "scripts/release-win-x64.ps1"
      - "RELEASE_NOTES.md"
      - "*.sln"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build, test and publish v1.0.0
    runs-on: windows-latest
    env:
      RELEASE_VERSION: "1.0.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build, test and package
        shell: pwsh
        run: .\scripts\release-win-x64.ps1 -Version $env:RELEASE_VERSION

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v4
        with:
          name: KKL-Word-Studio-v1.0.0-win-x64
          path: artifacts/KKL-Word-Studio-v1.0.0-win-x64.zip
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub release
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v$env:RELEASE_VERSION"
          $asset = "artifacts/KKL-Word-Studio-v$env:RELEASE_VERSION-win-x64.zip"

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag already exists; package artifact remains available from this workflow run."
            exit 0
          }

          gh release create $tag $asset `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title "KKL Word Studio v$env:RELEASE_VERSION" `
            --notes-file "RELEASE_NOTES.md"

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
