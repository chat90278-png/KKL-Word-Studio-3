name: Migrate guide screenshots to JPEG

on:
  push:
    branches:
      - feature/in-app-usage-guide
    paths:
      - "src/KKL.WordStudio.UI/Assets/GuideScreens/*.jpg.base64"
      - "src/KKL.WordStudio.UI/KKL.WordStudio.UI.csproj"
      - "src/KKL.WordStudio.UI/Services/GuideImageSourceLoader.cs"
      - "tests/KKL.WordStudio.Architecture.Tests/Sprint25UsageGuideArchitectureTests.cs"
      - "scripts/migrate-guide-images.ps1"
      - ".github/workflows/migrate-guide-jpeg-assets.yml"
  pull_request:
    branches:
      - fix/v1.0.1-branding-architecture-guard
    paths:
      - "src/KKL.WordStudio.UI/Assets/GuideScreens/*.jpg.base64"
      - "src/KKL.WordStudio.UI/KKL.WordStudio.UI.csproj"
      - "src/KKL.WordStudio.UI/Services/GuideImageSourceLoader.cs"
      - "tests/KKL.WordStudio.Architecture.Tests/Sprint25UsageGuideArchitectureTests.cs"
      - "scripts/migrate-guide-images.ps1"
      - ".github/workflows/migrate-guide-jpeg-assets.yml"

permissions:
  contents: write

jobs:
  migrate-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/in-app-usage-guide
          fetch-depth: 0

      - name: Install .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Convert Base64 resources to JPEG files
        shell: pwsh
        run: ./scripts/migrate-guide-images.ps1

      - name: Commit migration diagnostics
        if: failure() && hashFiles('migration-output.txt') != ''
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add migration-output.txt
          git commit -m "chore: capture JPEG migration failure"
          git push origin HEAD:feature/in-app-usage-guide

      - name: Validate JPEG files with WPF
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Add-Type -AssemblyName PresentationCore
          $files = Get-ChildItem "src/KKL.WordStudio.UI/Assets/GuideScreens/*.jpg"
          if ($files.Count -ne 10) {
            throw "Expected 10 JPEG guide assets, found $($files.Count)."
          }
          foreach ($file in $files) {
            $stream = [System.IO.File]::OpenRead($file.FullName)
            try {
              $bitmap = [System.Windows.Media.Imaging.BitmapImage]::new()
              $bitmap.BeginInit()
              $bitmap.CacheOption = [System.Windows.Media.Imaging.BitmapCacheOption]::OnLoad
              $bitmap.StreamSource = $stream
              $bitmap.EndInit()
              if ($bitmap.PixelWidth -le 0 -or $bitmap.PixelHeight -le 0) {
                throw "JPEG has invalid dimensions: $($file.Name)"
              }
              Write-Host "$($file.Name): $($bitmap.PixelWidth)x$($bitmap.PixelHeight)"
            }
            finally {
              $stream.Dispose()
            }
          }

      - name: Run Release tests
        shell: pwsh
        run: dotnet test -c Release

      - name: Commit JPEG assets
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all src/KKL.WordStudio.UI/Assets/GuideScreens
          if (-not (git status --porcelain --untracked-files=no)) {
            throw "JPEG migration produced no tracked repository changes."
          }
          git commit -m "fix: migrate guide screenshots to JPEG assets"
          git push origin HEAD:feature/in-app-usage-guide
